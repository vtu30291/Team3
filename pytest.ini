[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    happy: Happy path tests
    edge: Edge case tests
    failure: Failure/mock tests
    plane_a: Plane A: Happy Path Flows
    plane_b: Plane B: Boundary Edge Failures
    plane_c: Plane C: Chaos & Infrastructure Mocking
addopts = -v --tb=short
